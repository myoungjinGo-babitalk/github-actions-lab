name: 🏷️ Auto Release Tag

on:
  pull_request:
    types:
      - closed
    branches:
      - release

jobs:
  create-release-tag:
    name: Create Annotated Git Tag
    # PR이 실제로 머지된 경우에만 실행
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write   # git tag push 권한

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 전체 히스토리 필요 (태그 중복 확인용)

      - name: Extract version from PR title
        id: extract_version
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          echo "PR Title: $PR_TITLE"

          # PR 제목에서 버전 추출 (vYY.MM.DD 또는 vYY.MM.DDx 패턴)
          # 예) "[Release] v26.03.30" → v26.03.30
          # 예) "release v26.03.30a" → v26.03.30a
          # 예) "v26.03.30" → v26.03.30
          VERSION=$(echo "$PR_TITLE" | grep -oE 'v[0-9]{2}\.[0-9]{2}\.[0-9]{2}[a-z]?' | head -1)

          if [ -z "$VERSION" ]; then
            echo "❌ PR 제목에서 버전을 추출할 수 없습니다."
            echo "   올바른 형식: v26.03.30 또는 v26.03.30a"
            echo "   현재 PR 제목: $PR_TITLE"
            exit 1
          fi

          TAG_NAME="release_${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "✅ 추출된 버전: $VERSION → 태그명: $TAG_NAME"

      - name: Check for duplicate tag
        id: check_duplicate
        run: |
          TAG_NAME="${{ steps.extract_version.outputs.tag_name }}"

          if git tag --list | grep -q "^${TAG_NAME}$"; then
            echo "❌ 이미 존재하는 태그입니다: $TAG_NAME"
            echo "   HotFix의 경우 PR 제목에 알파벳을 추가하세요. (예: v26.03.30a)"
            exit 1
          fi

          echo "✅ 중복 없음: $TAG_NAME 태그를 생성합니다."

      - name: Build tag message
        id: build_message
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          VERSION="${{ steps.extract_version.outputs.version }}"

          # 태그 메시지: PR 제목을 릴리즈 요약으로 사용
          # PR body 첫 줄이 있으면 우선 사용, 없으면 PR 제목 사용
          FIRST_LINE=$(echo "$PR_BODY" | head -1 | xargs)

          if [ -n "$FIRST_LINE" ] && [ ${#FIRST_LINE} -gt 5 ]; then
            TAG_MESSAGE="$FIRST_LINE"
          else
            TAG_MESSAGE="$PR_TITLE"
          fi

          # 멀티라인 이슈 방지를 위해 단일 라인으로 정리
          TAG_MESSAGE=$(echo "$TAG_MESSAGE" | tr '\n' ' ' | xargs)

          echo "tag_message=$TAG_MESSAGE" >> $GITHUB_OUTPUT
          echo "✅ 태그 메시지: $TAG_MESSAGE"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Annotated Tag
        run: |
          TAG_NAME="${{ steps.extract_version.outputs.tag_name }}"
          TAG_MESSAGE="${{ steps.build_message.outputs.tag_message }}"
          MERGE_COMMIT="${{ github.event.pull_request.merge_commit_sha }}"

          echo "📌 태그 생성 중..."
          echo "   태그명: $TAG_NAME"
          echo "   메시지: $TAG_MESSAGE"
          echo "   커밋:   $MERGE_COMMIT"

          # Annotated Tag 생성 (특정 머지 커밋에 태깅)
          git tag -a "$TAG_NAME" "$MERGE_COMMIT" -m "$TAG_MESSAGE"

          # 원격 저장소에 push
          git push origin "$TAG_NAME"

          echo "✅ 태그 push 완료: $TAG_NAME"

      - name: Post summary
        run: |
          TAG_NAME="${{ steps.extract_version.outputs.tag_name }}"
          TAG_MESSAGE="${{ steps.build_message.outputs.tag_message }}"
          REPO="${{ github.repository }}"
          SHA="${{ github.event.pull_request.merge_commit_sha }}"

          echo "## 🏷️ Release Tag 생성 완료" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 태그명 | \`$TAG_NAME\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 태그 메시지 | $TAG_MESSAGE |" >> $GITHUB_STEP_SUMMARY
          echo "| 커밋 SHA | \`${SHA:0:7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 태그 링크 | https://github.com/$REPO/releases/tag/$TAG_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 🚀 이 태그가 CICD 파이프라인을 트리거합니다." >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "## ❌ 태그 생성 실패" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "PR 제목 어디든 버전 패턴이 포함되어야 합니다." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 패턴: \`v[YY].[MM].[DD]\` 또는 \`v[YY].[MM].[DD][a-z]\`" >> $GITHUB_STEP_SUMMARY
          echo "- 정식 배포 예) 제목에 \`v26.03.30\` 이 포함되면 OK" >> $GITHUB_STEP_SUMMARY
          echo "- HotFix 예) 제목에 \`v26.03.30a\` 이 포함되면 OK" >> $GITHUB_STEP_SUMMARY